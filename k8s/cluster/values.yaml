cluster:
  secret: "cluster-secret"

coreDB:
  path: ""
  name: "hugr-core"
  image:
    repository: pgvector/pgvector
    tag: pg16
  auth:
    username: "postgres"
    password: "hugrPass"
  port: 5432
  storage: "1Gi"

ingress:
  enabled: true
  className: "nginx"
  host: "hugr-cluster.local"

management:
  image:
    repository: ghcr.io/hugr-lab/automigrate
    tag: v0.3.9
    pullPolicy: IfNotPresent

  bind: ":15000"
  serviceBind: ":13000"

  cluster:
    role: "management"
    nodeName: "management"
    heartbeat: "30s"
    ghostTTL: "2m"

  mcp:
    enabled: false
    embedderURL: ""
    vectorSize: 768

  oidc:
    issuer: ""
    clientID: ""
    timeout: ""
    cookieName: ""
    scopeRolePrefix: ""
    claims:
      userId: ""
      userName: ""
      role: ""

  allowParallel: true
  maxParallelQueries: 0
  maxDepthInTypes: 0

  schemaCache:
    maxEntries: 0
    ttl: ""

  db:
    path: ""
    homeDirectory: "/db-home"
    maxOpenConns: 0
    maxIdleConns: 0
    settings:
      allowedDirectories: ""
      allowedPaths: ""
      enableLogging: ""
      maxMemory: ""
      maxTempDirectorySize: ""
      tempDirectory: ""
      workerThreads: ""
      pgConnectionLimit: 64
      pgPagesPerTask: ""

  dbHome:
    mountPath: /db-home
    storage: 1Gi
    storageClass: "standard"

  adminUI: true
  adminFetchPath: "/query"
  debug: false
  secretKey: ""

  cors:
    allowedOrigins: ""
    allowedMethods: "GET, POST, PUT, DELETE, OPTIONS"
    allowedHeaders: "Authorization, Content-Type, Accept"

  auth:
    managedApiKeys: false
    allowedAnonymous: true
    anonymousRole: "admin"
    configFile: ""

workNode:
  image:
    repository: ghcr.io/hugr-lab/server
    tag: v0.3.9
    pullPolicy: IfNotPresent

  replicas: 3

  bind: ":15000"
  serviceBind: ":13000"

  cluster:
    role: "worker"
    pollInterval: "30s"

  mcp:
    enabled: false
    embedderURL: ""
    vectorSize: 768

  schemaCache:
    maxEntries: 0
    ttl: ""

  adminUI: true
  adminFetchPath: "/query"
  debug: false
  secretKey: ""

  oidc:
    issuer: ""
    clientID: ""
    timeout: ""
    cookieName: ""
    scopeRolePrefix: ""
    claims:
      userId: ""
      userName: ""
      role: ""

  cors:
    allowedOrigins: ""
    allowedMethods: "GET, POST, PUT, DELETE, OPTIONS"
    allowedHeaders: "Authorization, Content-Type, Accept"

  auth:
    managedApiKeys: false
    allowedAnonymous: true
    anonymousRole: "admin"
    configFile: ""

  shared:
    size: "1Gi"
    mountPath: "/data"
    hostPath: "/data"

  allowParallel: true
  maxParallelQueries: 10
  maxDepthInTypes: 7

  dbHome:
    mountPath: /db-home
    storage: 1Gi
    storageClass: "standard"

  db:
    path: ""
    homeDirectory: "/db-home"
    maxOpenConns: 100
    maxIdleConns: 100
    settings:
      allowedDirectories: ""
      allowedPaths: ""
      enableLogging: ""
      maxMemory: ""
      maxTempDirectorySize: ""
      tempDirectory: ""
      workerThreads: ""
      pgConnectionLimit: 64
      pgPagesPerTask: ""

  cache:
    ttl: "15m"
    l1:
      enabled: true
      maxSize: 4096
      maxItemSize: 1024
      shards: 4
      cleanTime: "1m"
      evictionTime: "5m"
    l2:
      enabled: true
      backend: "redis"
      addresses: ""
      database: 0
      username: ""
      password: ""

redis:
  image:
    repository: redis
    tag: 7-alpine

postgresql:
  bitnami: false
  fullnameOverride: "coredb"
  auth:
    postgresPassword: "hugrPass"
  service:
    type: ClusterIP
    port: 5432
  persistence:
    enabled: true

cache:
  bitnami: false
  fullnameOverride: redis
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: false
  redis:
    port: 6379

prometheus:
  enabled: false
