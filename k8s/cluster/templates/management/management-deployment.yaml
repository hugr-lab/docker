apiVersion: apps/v1
kind: Deployment
metadata:
  name: management-node
  labels:
    app: management-node
spec:
  replicas: 1
  selector:
    matchLabels:
      app: management-node
  template:
    metadata:
      labels:
        app: management-node
        hugr-cluster-node: "true"
      annotations:
        {{- if .Values.prometheus.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ include "cluster.bindPort" .Values.management.bind | quote }}
        prometheus.io/path: /metrics
        {{- end }}
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - >
              until pg_isready -h {{ include "cluster.CoreDB.Host" . }} -p {{ include "cluster.CoreDB.Port" . }} -U {{ include "cluster.CoreDB.Username" . }};
              do echo "Waiting for PostgreSQL..."; sleep 3; done
          env:
            - name: PGPASSWORD
              value: {{ include "cluster.CoreDB.Password" . | quote }}
      containers:
        - name: management-node
          image: {{ .Values.management.image.repository }}:{{ .Values.management.image.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.management.image.pullPolicy }}
          ports:
            - containerPort: {{ include "cluster.bindPort" .Values.management.bind | int }}
            - containerPort: {{ include "cluster.bindPort" .Values.management.serviceBind | int }}
          envFrom:
            - configMapRef:
                name: management-node-config
          volumeMounts:
            - name: db-home
              mountPath: {{ .Values.management.dbHome.mountPath }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ include "cluster.bindPort" .Values.management.serviceBind | int }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ include "cluster.bindPort" .Values.management.serviceBind | int }}
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: db-home
          emptyDir: {}
