apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: work
  labels:
    app: work
spec:
  serviceName: work-headless
  replicas: {{ .Values.workNode.replicas | default 1 }}
  selector:
    matchLabels:
      app: work
  template:
    metadata:
      labels:
        app: work
        hugr-cluster-node: "true"
      annotations:
        {{- if .Values.prometheus.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ include "cluster.bindPort" .Values.workNode.bind | quote }}
        prometheus.io/path: /metrics
        {{- end }}
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - >
              until pg_isready -h {{ include "cluster.CoreDB.Host" . }} -p {{ include "cluster.CoreDB.Port" . }} -U {{ include "cluster.CoreDB.Username" . }};
              do echo "Waiting for PostgreSQL..."; sleep 3; done
          env:
            - name: PGPASSWORD
              value: {{ include "cluster.CoreDB.Password" . | quote }}
        {{- if .Values.workNode.cache.l2.enabled }}
        - name: wait-for-cache
          image: busybox
          command:
            - sh
            - -c
            - >
              CACHE_NODE="{{ include "cluster.Cache.Host" . }}";
              CACHE_NODE_PORT={{ .Values.cache.redis.port | default 6379 }};
              until nc -z $CACHE_NODE $CACHE_NODE_PORT;
              do echo "Waiting for cache node at $CACHE_NODE:$CACHE_NODE_PORT to be ready..." ; sleep 1; done
        {{- end}}
      containers:
        - name: work
          image: {{ .Values.workNode.image.repository }}:{{ .Values.workNode.image.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.workNode.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: {{ include "cluster.bindPort" .Values.workNode.bind | int }}
            - containerPort: {{ include "cluster.bindPort" .Values.workNode.serviceBind | int }}
          envFrom:
            - configMapRef:
                name: work-node-config
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CLUSTER_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CLUSTER_NODE_URL
              value: "http://$(CLUSTER_NODE_NAME).work-headless.{{ .Release.Namespace }}.svc.cluster.local:{{ include "cluster.bindPort" .Values.workNode.bind }}/ipc"
            - name: DB_HOME_DIRECTORY
              value: {{ .Values.workNode.dbHome.mountPath | default "/db-home" }}
          volumeMounts:
            - name: shared
              mountPath: /data
            - name: db-home
              mountPath: {{ .Values.workNode.dbHome.mountPath | default "/db-home" }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ include "cluster.bindPort" .Values.workNode.serviceBind | int }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ include "cluster.bindPort" .Values.workNode.serviceBind | int }}
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: shared
          persistentVolumeClaim:
            claimName: work-shared-pvc
  volumeClaimTemplates:
    - metadata:
        name: db-home
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: {{ .Values.workNode.dbHome.storageClass | default "standard" }}
        resources:
          requests:
            storage: {{ .Values.workNode.dbHome.storage | default "1Gi" }}
