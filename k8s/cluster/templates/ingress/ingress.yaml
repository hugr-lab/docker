apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: work
  annotations:
    {{- if .Values.prometheus.enabled }}
    prometheus.io/scrape: "true"
    {{- end }}
spec:
  ingressClassName: traefik
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: work
                port:
                  number: {{ include "cluster.bindPort" .Values.workNode.bind | int }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: management-node
                port:
                  number: {{ include "cluster.bindPort" .Values.management.bind | int }}
