services:
  core-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: hugr
      POSTGRES_PASSWORD: hugr
      POSTGRES_DB: hugr
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hugr"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  management:
    image: ghcr.io/hugr-lab/automigrate:latest
    depends_on:
      core-db:
        condition: service_healthy
    environment:
      BIND: ":15000"
      SERVICE_BIND: ":13000"
      CORE_DB_PATH: "postgres://hugr:hugr@core-db:5432/hugr"

      # Cluster
      CLUSTER_ENABLED: "true"
      CLUSTER_ROLE: "management"
      CLUSTER_NODE_NAME: "management"
      CLUSTER_NODE_URL: "http://management:15000/ipc"
      CLUSTER_SECRET: "${CLUSTER_SECRET:-cluster-secret}"
      CLUSTER_HEARTBEAT: "30s"
      CLUSTER_GHOST_TTL: "2m"

      # MCP + Embedder
      MCP_ENABLED: "${MCP_ENABLED:-false}"
      EMBEDDER_URL: "${EMBEDDER_URL:-}"

      # Auth
      ALLOWED_ANONYMOUS: "${ALLOWED_ANONYMOUS:-true}"
      ANONYMOUS_ROLE: "${ANONYMOUS_ROLE:-admin}"
      AUTH_CONFIG_FILE: "${AUTH_CONFIG_FILE:-}"

      # DuckDB
      DB_HOME_DIRECTORY: "/db-home"
    volumes:
      - management-db-home:/db-home
      - shared-data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:13000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  node1:
    image: ghcr.io/hugr-lab/server:latest
    depends_on:
      core-db:
        condition: service_healthy
      management:
        condition: service_healthy
    environment:
      BIND: ":15000"
      SERVICE_BIND: ":13000"
      CORE_DB_PATH: "postgres://hugr:hugr@core-db:5432/hugr"

      # Cluster
      CLUSTER_ENABLED: "true"
      CLUSTER_ROLE: "worker"
      CLUSTER_NODE_NAME: "node1"
      CLUSTER_NODE_URL: "http://node1:15000/ipc"
      CLUSTER_SECRET: "${CLUSTER_SECRET:-cluster-secret}"
      CLUSTER_POLL_INTERVAL: "30s"

      # MCP + Embedder
      MCP_ENABLED: "${MCP_ENABLED:-false}"
      EMBEDDER_URL: "${EMBEDDER_URL:-}"

      # Auth
      ALLOWED_ANONYMOUS: "${ALLOWED_ANONYMOUS:-true}"
      ANONYMOUS_ROLE: "${ANONYMOUS_ROLE:-admin}"
      AUTH_CONFIG_FILE: "${AUTH_CONFIG_FILE:-}"

      # DuckDB
      DB_HOME_DIRECTORY: "/db-home"

      # Cache
      CACHE_L1_ENABLED: "true"
      CACHE_L1_MAX_SIZE: "256"
      CACHE_L2_ENABLED: "true"
      CACHE_L2_BACKEND: "redis"
      CACHE_L2_ADDRESSES: "redis:6379"
    volumes:
      - node1-db-home:/db-home
      - shared-data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:13000/health"]
      interval: 10s

  node2:
    image: ghcr.io/hugr-lab/server:latest
    depends_on:
      core-db:
        condition: service_healthy
      management:
        condition: service_healthy
    environment:
      BIND: ":15000"
      SERVICE_BIND: ":13000"
      CORE_DB_PATH: "postgres://hugr:hugr@core-db:5432/hugr"

      # Cluster
      CLUSTER_ENABLED: "true"
      CLUSTER_ROLE: "worker"
      CLUSTER_NODE_NAME: "node2"
      CLUSTER_NODE_URL: "http://node2:15000/ipc"
      CLUSTER_SECRET: "${CLUSTER_SECRET:-cluster-secret}"
      CLUSTER_POLL_INTERVAL: "30s"

      # MCP + Embedder
      MCP_ENABLED: "${MCP_ENABLED:-false}"
      EMBEDDER_URL: "${EMBEDDER_URL:-}"

      # Auth
      ALLOWED_ANONYMOUS: "${ALLOWED_ANONYMOUS:-true}"
      ANONYMOUS_ROLE: "${ANONYMOUS_ROLE:-admin}"
      AUTH_CONFIG_FILE: "${AUTH_CONFIG_FILE:-}"

      # DuckDB
      DB_HOME_DIRECTORY: "/db-home"

      # Cache
      CACHE_L1_ENABLED: "true"
      CACHE_L1_MAX_SIZE: "256"
      CACHE_L2_ENABLED: "true"
      CACHE_L2_BACKEND: "redis"
      CACHE_L2_ADDRESSES: "redis:6379"
    volumes:
      - node2-db-home:/db-home
      - shared-data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:13000/health"]
      interval: 10s

  nginx:
    image: nginx:alpine
    ports:
      - "15000:15000"
    volumes:
      - ./example.cluster.nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - management
      - node1
      - node2

volumes:
  postgres-data:
  management-db-home:
  node1-db-home:
  node2-db-home:
  shared-data:
